<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1">
		<title>Boxel 3D</title>
		<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	</head>
	<body>
		<div class="ui-controller">
			<div class="row top">
				<div class="col">
					<a href="#draw" class="pencil"></a>
					<a href="#erase" class="eraser"></a>
					<a href="#move" class="move"></a>
					<a href="#home" class="home"></a>
					<a href="#save" class="save"></a>
					<a href="#undo" class="undo"></a>
					<a href="#redo" class="redo"></a>
					<a href="#rewind" class="rewind"></a>
					<a href="#pause" class="pause"></a>
					<a href="#play" class="play"></a>
				</div>
			</div>
			<div class="row left">
				<div class="col">
					<a href="#cube" class="cube"></a>
					<a href="#tip" class="tip"></a>
					<a href="#jump" class="jump"></a>
					<a href="#checkpoint" class="checkpoint"></a>
					<a href="#spike" class="spike"></a>
					<a href="#shrink" class="shrink"></a>
					<a href="#grow" class="grow"></a>
					<a href="#finish" class="finish"></a>
				</div>
				<div class="col">
					<a href="#pin" class="pin"></a>
					<a href="#drag" class="drag"></a>
					<a href="#move-up" class="move-up"></a>
					<a href="#move-down" class="move-down"></a>
					<a href="#move-right" class="move-right"></a>
					<a href="#move-left" class="move-left"></a>
					<a href="#rotate-clockwise" class="rotate-clockwise"></a>
					<a href="#rotate-counterclockwise" class="rotate-counterclockwise"></a>
					<a href="#scale-out-x" class="scale-out-x"></a>
					<a href="#scale-in-x" class="scale-in-x"></a>
					<a href="#scale-out-y" class="scale-out-y"></a>
					<a href="#scale-in-y" class="scale-in-y"></a>
					<a href="#trash" class="trash"></a>
				</div>
			</div>
		</div>
		<script src="js/jquery-3.5.0.min.js"></script>
		<script src="js/three.min.js"></script>
		<script src="js/matter.min.js"></script>
		<script src="js/stats.min.js"></script>
		<script src="js/cube.js"></script>
		<script src="js/player.js"></script>
		<script src="js/ui-controller.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
