<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1">
		<title>Boxel 3D</title>
		<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	</head>
	<body>
		<div class="ui-controller">
			<div class="row top">
				<div class="col options-level">
					<a href="add"><img src="img/svg/pencil.svg"></a>
					<a href="erase"><img src="img/svg/eraser.svg"></a>
					<a href="move"><img src="img/svg/move.svg"></a>
					<a href="home" class="home"><img src="img/svg/home.svg"></a>
					<a href="save" class="save"><img src="img/svg/save.svg"></a>
					<a href="upload" class="upload"><img src="img/svg/upload.svg"></a>
					<a href="undo" class="undo"><img src="img/svg/undo.svg"></a>
					<a href="redo" class="redo"><img src="img/svg/redo.svg"></a>
					<a href="rewind" class="rewind"><img src="img/svg/rewind.svg"></a>
					<a href="pause" class="pause"><img src="img/svg/pause.svg"></a>
					<a href="play" class="play"><img src="img/svg/play.svg"></a>
				</div>
			</div>
			<div class="row left">
				<div class="col options-object-type">
					<a href="cube"><img src="img/svg/cube.svg"></a>
					<a href="tip"><img src="img/svg/tip.svg"></a>
					<a href="jump"><img src="img/svg/jump.svg"></a>
					<a href="checkpoint"><img src="img/svg/checkpoint.svg"></a>
					<a href="spike"><img src="img/svg/spike.svg"></a>
					<a href="shrink"><img src="img/svg/shrink.svg"></a>
					<a href="grow"><img src="img/svg/grow.svg"></a>
					<a href="finish"><img src="img/svg/finish.svg"></a>
				</div>
				<div class="col options-object-properties disabled">
					<a href="pin"><img src="img/svg/pin.svg"></a>
					<a href="drag"><img src="img/svg/drag.svg"></a>
					<a href="move-up"><img src="img/svg/move-up.svg"></a>
					<a href="move-down"><img src="img/svg/move-down.svg"></a>
					<a href="move-right"><img src="img/svg/move-right.svg"></a>
					<a href="move-left"><img src="img/svg/move-left.svg"></a>
					<a href="rotate-clockwise"><img src="img/svg/rotate-clockwise.svg"></a>
					<a href="rotate-counterclockwise"><img src="img/svg/rotate-counterclockwise.svg"></a>
					<a href="scale-out-x"><img src="img/svg/scale-out-x.svg"></a>
					<a href="scale-in-x"><img src="img/svg/scale-in-x.svg"></a>
					<a href="scale-out-y"><img src="img/svg/scale-out-y.svg"></a>
					<a href="scale-in-y"><img src="img/svg/scale-in-y.svg"></a>
					<a href="trash"><img src="img/svg/trash.svg"></a>
				</div>
			</div>
		</div>
		<script src="js/jquery-3.5.0.min.js"></script>
		<script src="js/three.min.js"></script>
		<script src="js/matter.min.js"></script>
		<script src="js/stats.min.js"></script>
		<script src="js/cube.js"></script>
		<script src="js/player.js"></script>
		<script src="js/ui-controller.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
