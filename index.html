<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1">
		<title>Boxel 3D</title>
		<link rel='shortcut icon' type='image/x-icon' href='img/png/favicon.png' />
		<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	</head>
	<body>
		<div class="ui-controller">
			<div class="row top">
				<div class="col options-level">
					<a class="item" href="add" title="Add cubes"><img src="img/svg/pencil.svg"></a>
					<a class="item" href="erase" title="Erase cubes"><img src="img/svg/eraser.svg"></a>
					<a class="item" href="home" title="Exit level editor"><img src="img/svg/home.svg"></a>
					<a class="item" href="save" title="Save level"><img src="img/svg/save.svg"></a>
					<a class="item" href="upload" title="Upload level"><img src="img/svg/upload.svg"></a>
					<a class="item" href="undo" title="Undo edit"><img src="img/svg/undo.svg"></a>
					<a class="item" href="redo" title="Redo edit"><img src="img/svg/redo.svg"></a>
					<a class="item" href="rewind" title="Restart level"><img src="img/svg/rewind.svg"></a>
					<a class="item" href="pause" title="Pause level"><img src="img/svg/pause.svg"></a>
					<a class="item" href="play" title="Play level"><img src="img/svg/play.svg"></a>
				</div>
			</div>
			<div class="row left">
				<div class="col options-object-type">
					<a class="item" href="cube" title="Basic cube"><img src="img/svg/cube.svg"></a>
					<a class="item" href="tip" title="Tip cube"><img src="img/svg/tip.svg"></a>
					<a class="item" href="jump" title="Jump cube"><img src="img/svg/jump.svg"></a>
					<a class="item" href="checkpoint" title="Checkpoint cube"><img src="img/svg/checkpoint.svg"></a>
					<a class="item" href="spike" title="Spike cube"><img src="img/svg/spike.svg"></a>
					<a class="item" href="shrink" title="Shrink cube"><img src="img/svg/shrink.svg"></a>
					<a class="item" href="grow" title="Grow cube"><img src="img/svg/grow.svg"></a>
					<a class="item" href="finish" title="Finish cube"><img src="img/svg/finish.svg"></a>
				</div>
				<div class="col options-object-properties disabled">
					<a class="item" href="pin" title="Pin"><img src="img/svg/pin.svg"></a>
					<div class="item">
						<a href="rotate" title="Rotate"><img src="img/svg/rotate-clockwise.svg"></a>
						<div class="slider"><input name="rotate" type="range" min="0" max="360" step="15" value="0"></div>
					</div>
					<div class="item">
						<a href="scale-x" title="Scale-X"><img src="img/svg/scale-out-x.svg"></a>
						<div class="slider"><input name="scale-x" type="range" min="16" max="512" step="16" value="16"></div>
					</div>
					<div class="item">
						<a href="scale-y" title="Scale-Y"><img src="img/svg/scale-out-y.svg"></a>
						<div class="slider"><input name="scale-y" type="range" min="16" max="512" step="16" value="16"></div>
					</div>
					<a class="item" href="accept" title="Accept"><img src="img/svg/accept.svg"></a>
					<a class="item" href="trash" title="Delete"><img src="img/svg/trash.svg"></a>
				</div>
			</div>
		</div>
		<script src="js/jquery-3.5.0.min.js"></script>
		<script src="js/three.min.js"></script>
		<script src="js/matter.min.js"></script>
		<script src="js/stats.min.js"></script>
		<script src="js/cube.js"></script>
		<script src="js/player.js"></script>
		<script src="js/ui-controller.js"></script>
		<script src="js/mouse.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
