<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, minimum-scale=1">
		<title>Boxel 3D</title>
		<link rel='shortcut icon' type='image/x-icon' href='img/png/favicon.png' />
		<link rel="stylesheet" type="text/css" href="css/stylesheet.css">
	</head>
	<body>
		<div class="ui-controller">
			<div class="row top">
				<div class="col options-level">
					<a href="add" title="Add cubes"><img src="img/svg/pencil.svg"></a>
					<a href="erase" title="Erase cubes"><img src="img/svg/eraser.svg"></a>
					<a href="move" title="Move camera"><img src="img/svg/move.svg"></a>
					<a href="home" title="Exit level editor"><img src="img/svg/home.svg"></a>
					<a href="save" title="Save level"><img src="img/svg/save.svg"></a>
					<a href="upload" title="Upload level"><img src="img/svg/upload.svg"></a>
					<a href="undo" title="Undo edit"><img src="img/svg/undo.svg"></a>
					<a href="redo" title="Redo edit"><img src="img/svg/redo.svg"></a>
					<a href="rewind" title="Restart level"><img src="img/svg/rewind.svg"></a>
					<a href="pause" title="Pause level"><img src="img/svg/pause.svg"></a>
					<a href="play" title="Play level"><img src="img/svg/play.svg"></a>
				</div>
			</div>
			<div class="row left">
				<div class="col options-object-type">
					<a href="cube" title="Basic cube"><img src="img/svg/cube.svg"></a>
					<a href="tip" title="Tip cube"><img src="img/svg/tip.svg"></a>
					<a href="jump" title="Jump cube"><img src="img/svg/jump.svg"></a>
					<a href="checkpoint" title="Checkpoint cube"><img src="img/svg/checkpoint.svg"></a>
					<a href="spike" title="Spike cube"><img src="img/svg/spike.svg"></a>
					<a href="shrink" title="Shrink cube"><img src="img/svg/shrink.svg"></a>
					<a href="grow" title="Grow cube"><img src="img/svg/grow.svg"></a>
					<a href="finish" title="Finish cube"><img src="img/svg/finish.svg"></a>
				</div>
				<div class="col options-object-properties disabled">
					<a href="pin" title="Pin"><img src="img/svg/pin.svg"></a>
					<a href="drag" title="Drag"><img src="img/svg/drag.svg"></a>
					<a href="move-up" title="Move up"><img src="img/svg/move-up.svg"></a>
					<a href="move-down" title="Move down"><img src="img/svg/move-down.svg"></a>
					<a href="move-right" title="Move right"><img src="img/svg/move-right.svg"></a>
					<a href="move-left" title="Move left"><img src="img/svg/move-left.svg"></a>
					<a href="rotate-clockwise" title="Rotate clockwise"><img src="img/svg/rotate-clockwise.svg"></a>
					<a href="rotate-counterclockwise" title="Rotate counter-clockwise"><img src="img/svg/rotate-counterclockwise.svg"></a>
					<a href="scale-out-x" title="Scale-X out"><img src="img/svg/scale-out-x.svg"></a>
					<a href="scale-in-x" title="Scale-X in"><img src="img/svg/scale-in-x.svg"></a>
					<a href="scale-out-y" title="Scale-Y out"><img src="img/svg/scale-out-y.svg"></a>
					<a href="scale-in-y" title="Scale-Y in"><img src="img/svg/scale-in-y.svg"></a>
					<a href="trash" title="Delete"><img src="img/svg/trash.svg"></a>
				</div>
			</div>
		</div>
		<script src="js/jquery-3.5.0.min.js"></script>
		<script src="js/three.min.js"></script>
		<script src="js/matter.min.js"></script>
		<script src="js/stats.min.js"></script>
		<script src="js/cube.js"></script>
		<script src="js/player.js"></script>
		<script src="js/ui-controller.js"></script>
		<script src="js/app.js"></script>
	</body>
</html>
